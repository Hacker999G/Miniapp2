<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DT EARNING ZONE</title>
    <link rel="icon" href="https://i.ibb.co/gLQsBHNp/logo.png" />

    <script src='//libtl.com/sdk.js' data-zone='10251457' data-sdk='show_10251457'></script>

    <script>
      window.show_10251457 = window.show_10251457 || function() {
          console.warn("Monetag SDK is not loaded yet.");
          return Promise.reject("SDK_NOT_READY");
      };
    </script>

    <script>
      window.Telegram = window.Telegram || {};
      window.Telegram.WebApp = window.Telegram.WebApp || {};
      
      const mockCloudStorage = {
        setItem: (k, v, cb) => cb && cb(null, false),
        getItem: (k, cb) => cb && cb(null, null),
        removeItem: (k, cb) => cb && cb(null, false),
        getKeys: (cb) => cb && cb(null, [])
      };

      if (!window.Telegram.WebApp.CloudStorage) {
        Object.defineProperty(window.Telegram.WebApp, 'CloudStorage', {
          get: () => mockCloudStorage,
          configurable: true,
          enumerable: true
        });
      }
    </script>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
      (function() {
        const applyPolyfill = () => {
          if (window.Telegram && window.Telegram.WebApp) {
            const version = window.Telegram.WebApp.version || "6.0";
            const [major, minor] = version.split('.').map(Number);
            const isSupported = major > 6 || (major === 6 && minor >= 9);

            if (!isSupported || !window.Telegram.WebApp.CloudStorage) {
              try {
                Object.defineProperty(window.Telegram.WebApp, 'CloudStorage', {
                  value: {
                    setItem: (k, v, cb) => cb && cb(null, false),
                    getItem: (k, cb) => cb && cb(null, null),
                    removeItem: (k, cb) => cb && cb(null, false),
                    getKeys: (cb) => cb && cb(null, [])
                  },
                  writable: true,
                  configurable: true,
                  enumerable: true
                });
              } catch (e) {}
            }
          }
        };
        applyPolyfill();
        window.addEventListener('DOMContentLoaded', applyPolyfill);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
